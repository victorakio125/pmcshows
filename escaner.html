<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portero Pro - Escáner Dark</title>
    
    <script>
        if (!sessionStorage.getItem("rol")) {
            window.location.href = "login.html";
        }
    </script>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
    /* TEMA: DARK METAL MODE */
    :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --primary: #007bff;
        --text: #e0e0e0;
        --border: #333333;
        --shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    body { 
        font-family: 'Segoe UI', sans-serif; 
        text-align: center; 
        background-color: var(--bg-color); 
        color: var(--text); 
        padding: 30px 20px; 
        margin: 0;
        min-height: 100vh;
        display: flex; justify-content: center; align-items: flex-start;
    }

    .container { 
        background: var(--card-bg); 
        width: 100%;
        max-width: 500px; 
        padding: 30px; 
        border-radius: 12px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        margin-top: 30px;
    }

    h2 { color: #ffffff; font-weight: 600; margin-bottom: 25px; letter-spacing: 1px; text-transform: uppercase; }

    #reader { 
        width: 100%; 
        background-color: #000000; 
        border-radius: 8px;
        border: 1px solid var(--border);
        overflow: hidden; 
        margin-bottom: 25px;
    }
    
    #reader * { color: var(--text); }
    #reader button { 
        background: #333333 !important; border: 1px solid #555 !important; 
        color: white !important; padding: 8px 12px !important; border-radius: 4px !important; 
    }

    #resultado { 
        margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 1.1em; font-weight: 500; display: none;
    }
    
    /* Colores Neón para visibilidad en la oscuridad */
    .exito { background: rgba(40, 167, 69, 0.1); color: #4ade80; border: 1px solid #28a745; box-shadow: 0 0 10px rgba(40,167,69,0.2); }
    .error { background: rgba(220, 53, 69, 0.1); color: #ff8a8a; border: 1px solid #dc3545; box-shadow: 0 0 10px rgba(220,53,69,0.2); }
    .alerta { background: rgba(255, 193, 7, 0.1); color: #ffd859; border: 1px solid #ffc107; box-shadow: 0 0 10px rgba(255,193,7,0.2); }

    button#btnReset { 
        width: 100%; padding: 14px; border: none; border-radius: 6px;
        background-color: var(--primary); 
        color: white; font-weight: 600; font-size: 16px; cursor: pointer; 
        margin-top: 20px; display: none;
    }
    button#btnReset:hover { background-color: #0056b3; }

    .nombre-gigante {
        display: block; font-size: 1.8em; font-weight: 700; margin: 10px 0;      
        text-transform: capitalize; color: #ffffff;          
        border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
    }

    .btn-logout {
        margin-top: 30px; background: transparent; color: #dc3545; width: 100%;
        padding: 12px 20px; border: 1px solid #dc3545; border-radius: 6px;
        font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-logout:hover { background: #dc3545; color: white; }
</style>
</head>
<body>

    <div class="container">
        <h2>👁️‍🗨️ PMC Access</h2>
        <div id="reader"></div>
        <div id="resultado">Esperando...</div>
        <button onclick="reiniciarEscaner()" id="btnReset">Escanear Siguiente</button>

        <button class="btn-logout" onclick="logout()">Cerrar Sesión 🚪</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOG97oCLCpAAN6fUzHRwkyev1pC_Kdx1I",
            authDomain: "pmcshows-40113.firebaseapp.com",
            projectId: "pmcshows-40113",
            storageBucket: "pmcshows-40113.firebasestorage.app",
            messagingSenderId: "979468863982",
            appId: "1:979468863982:web:2e307aea5f0a0f8f86e6ff"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let html5QrcodeScanner;
        let escaneoPausado = false; 

        // 🔊 OBJETOS DE SONIDO (Cargados desde la web)
        const sonidoExito = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        const sonidoError = new Audio("https://actions.google.com/sounds/v1/alarms/buzzer_alarm.ogg");

        function onScanSuccess(decodedText) {
            if (escaneoPausado) return;
            escaneoPausado = true; 
            verificarTicket(decodedText);
        }

        async function verificarTicket(ticketId) {
            const resultadoDiv = document.getElementById("resultado");
            const btnReset = document.getElementById("btnReset");

            resultadoDiv.style.display = "block";
            resultadoDiv.className = ""; 
            resultadoDiv.innerHTML = "⏳ Verificando encriptación...";
            btnReset.style.display = "none";

            try {
                if (!ticketId) throw new Error("QR vacío");
                const docRef = db.collection("tickets").doc(ticketId);

                const timeoutPromise = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error("Tiempo de espera agotado")), 5000)
                );

                const docSnap = await Promise.race([ docRef.get(), timeoutPromise ]);

                if (!docSnap.exists) {
                    sonidoError.play(); // 🔊
                    mostrarMensaje("❌ TICKET FALSO / INVÁLIDO<br><small>Rechazar ingreso</small>", "error");
                } else {
                    const data = docSnap.data();
                    if (data.usado === true) {
                        sonidoError.play(); // 🔊
                        let hora = "Hora desconocida";
                        try { hora = new Date(data.fecha_uso).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); } catch(e){}

                        mostrarMensaje(`
                            ⚠️ ALERTA: YA REGISTRADO
                            <div class="nombre-gigante" style="color: #ffd859">${data.nombre}</div>
                            <small>Este código ya ingresó a las ${hora}</small>
                        `, "alerta");
                    } else {
                        await docRef.update({ usado: true, fecha_uso: new Date().toISOString() });
                        sonidoExito.play(); // 🔊
                        mostrarMensaje(`
                            ✅ ACCESO CONCEDIDO
                            <div class="nombre-gigante" style="color: #4ade80">${data.nombre}</div>
                            <small>Identidad verificada. Dejar pasar.</small>
                        `, "exito");
                    }
                }
            } catch (error) {
                sonidoError.play(); // 🔊
                mostrarMensaje(`💀 ERROR DE RED<br><small>${error.message}</small>`, "error");
            }
            btnReset.style.display = "inline-block";
        }

        function mostrarMensaje(texto, clase) {
            const div = document.getElementById("resultado");
            div.innerHTML = texto; div.className = clase;
        }

        function reiniciarEscaner() {
            escaneoPausado = false;
            document.getElementById("resultado").style.display = "none";
            document.getElementById("btnReset").style.display = "none";
        }

        function logout() { sessionStorage.clear(); window.location.href = "login.html"; }

        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, () => {});
    </script>
</body>
</html>
