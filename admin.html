<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PMC Shows</title>
    
    <script>
        if (sessionStorage.getItem("rol") !== "admin") {
            window.location.href = "login.html";
        }
    </script> 

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>
    :root { --bg: #f4f4f9; --card: #ffffff; --primary: #007bff; --success: #28a745; --text: #333; --shadow: 0 4px 15px rgba(0,0,0,0.08); }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 30px 20px; text-align: center; margin: 0; }
    
    .header-control { max-width: 900px; margin: 0 auto 30px auto; display: flex; justify-content: space-between; align-items: center; }
    select { padding: 10px; font-size: 16px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; }
    
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 900px; margin: 0 auto 30px auto; }
    
    .card { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid #e0e0e0; transition: 0.2s; }
    .card:hover { transform: translateY(-3px); }
    
    .number { font-size: 3em; font-weight: 700; color: var(--primary); margin: 10px 0; }
    .money { color: var(--success); }
    .label { color: #666; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    
    .charts-container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 900px; margin: auto; }
    .chart-box { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid #e0e0e0; flex: 1; min-width: 300px; }
</style>
</head>
<body>

    <div class="header-control">
        <h1>📊 Analíticas en Vivo</h1>
        <select id="filtroEvento" onchange="renderizarDashboard()">
            <option value="Todos">Todos los Eventos</option>
        </select>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <div class="label">Entradas Vendidas</div>
            <div class="number" id="totalVendidos">0</div>
        </div>
        <div class="card">
            <div class="label">Asistentes Ingresados</div>
            <div class="number" id="totalIngresados">0</div>
        </div>
        <div class="card">
            <div class="label">Recaudación Bruta</div>
            <div class="number money" id="totalRecaudado">S/ 0</div>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <h3 style="color:#666; margin-top:0;">Estado de Puerta</h3>
            <canvas id="graficaPuerta"></canvas>
        </div>
        <div class="chart-box">
            <h3 style="color:#666; margin-top:0;">Ventas por Tipo</h3>
            <canvas id="graficaTipos"></canvas>
        </div>
    </div>

    <button onclick="logout()" style="margin-top: 40px; background: #dc3545; color:white; border:none; border-radius:6px; padding: 10px 20px; cursor:pointer; font-weight:bold;">Cerrar Sesión 🚪</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOG97oCLCpAAN6fUzHRwkyev1pC_Kdx1I",
            authDomain: "pmcshows-40113.firebaseapp.com",
            projectId: "pmcshows-40113",
            storageBucket: "pmcshows-40113.firebasestorage.app",
            messagingSenderId: "979468863982",
            appId: "1:979468863982:web:2e307aea5f0a0f8f86e6ff"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let todosLosTickets = [];
        let chartPuerta, chartTipos;

        // Inicializar Gráficas
        const ctxPuerta = document.getElementById('graficaPuerta').getContext('2d');
        chartPuerta = new Chart(ctxPuerta, {
            type: 'doughnut',
            data: { labels: ['Ingresaron', 'Faltan'], datasets: [{ data: [0, 0], backgroundColor: ['#007bff', '#e9ecef'] }] }
        });

        const ctxTipos = document.getElementById('graficaTipos').getContext('2d');
        chartTipos = new Chart(ctxTipos, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Tickets', data: [], backgroundColor: '#28a745' }] }
        });

        // Escuchar Base de Datos
        db.collection("tickets").onSnapshot((snapshot) => {
            todosLosTickets = [];
            let eventosSet = new Set();

            snapshot.forEach((doc) => {
                let data = doc.data();
                todosLosTickets.push(data);
                if(data.evento) eventosSet.add(data.evento); // Guardar eventos únicos
            });

            actualizarSelectEventos(Array.from(eventosSet));
            renderizarDashboard();
        });

        function actualizarSelectEventos(eventosDb) {
            const select = document.getElementById("filtroEvento");
            const actual = select.value;
            select.innerHTML = '<option value="Todos">Todos los Eventos</option>';
            
            eventosDb.forEach(ev => {
                let option = document.createElement("option");
                option.value = ev; option.text = ev;
                select.appendChild(option);
            });
            select.value = actual; // Mantener selección si se recarga en vivo
        }

        function renderizarDashboard() {
            let eventoSel = document.getElementById("filtroEvento").value;
            let tickets = eventoSel === "Todos" ? todosLosTickets : todosLosTickets.filter(t => t.evento === eventoSel);

            let vendidos = tickets.length;
            let ingresados = tickets.filter(t => t.usado === true).length;
            let recaudado = tickets.reduce((acc, t) => acc + (t.precio || 0), 0);

            // Actualizar Tarjetas
            document.getElementById("totalVendidos").innerText = vendidos;
            document.getElementById("totalIngresados").innerText = ingresados;
            document.getElementById("totalRecaudado").innerText = "S/ " + recaudado.toFixed(2);

            // Actualizar Gráfica Puerta
            chartPuerta.data.datasets[0].data = [ingresados, vendidos - ingresados];
            chartPuerta.update();

            // Calcular Tipos de Entrada
            let conteoTipos = {};
            tickets.forEach(t => {
                let tipo = t.tipo || "Desconocido";
                conteoTipos[tipo] = (conteoTipos[tipo] || 0) + 1;
            });

            // Actualizar Gráfica Barras
            chartTipos.data.labels = Object.keys(conteoTipos);
            chartTipos.data.datasets[0].data = Object.values(conteoTipos);
            chartTipos.update();
        }

        function logout() { sessionStorage.clear(); window.location.href = "login.html"; }
    </script>
</body>
</html>
